name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # گیت‌هاب ریپوزیتوری رو چک‌اوت می‌کنه
      - uses: actions/checkout@v3

      # نصب Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # به‌روز کردن pip و نصب dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # اجرای تست‌ها با pytest
      - name: Run tests
        run: python -m pytest
